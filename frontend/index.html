<!DOCTYPE html>
<html>
<head>
  <title>Todo Demo</title>
  <style>
    body { font-family: Arial; max-width: 500px; margin: 2rem auto; }
    .todo { display: flex; gap: 0.5rem; margin: 0.5rem 0; align-items: center; }
    .completed { text-decoration: line-through; color: gray; }
    button { margin-left: auto; }
  </style>
</head>
<body>
  <h1>Todo List (Docker Compose Watch)</h1>
  <div>
    <input type="text" id="newTodo" placeholder="Buy milk...">
    <button id="addBtn">Add</button>
  </div>
  <div id="todoList"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
