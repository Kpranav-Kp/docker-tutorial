services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync+restart
          path: ./frontend
          target: /app